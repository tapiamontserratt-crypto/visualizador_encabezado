<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador Planes Reguladores Intercomunales</title>
  <style>
    :root {
      --gris-fondo: #f2f3f5;
      --gris-header: #e4e7ea;
      --gris-borde: #c9ced4;
      --azul-gob: #0072bc;
      --rojo-gob: #ef3340;
      --texto: #263238;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
    }

    .encabezado-institucional {
      width: 100%;
      min-height: 120px;
      background: linear-gradient(90deg, #dfe3e7 0%, #f4f5f6 100%);
      border-bottom: 4px solid var(--gris-borde);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 20px 42px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .bloque-logo {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 300px;
    }

    .logo-seremi {
      height: 82px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .separador-vertical {
      width: 2px;
      height: 70px;
      background: linear-gradient(to bottom, var(--azul-gob), var(--rojo-gob));
      opacity: 0.75;
    }

    .texto-institucional {
      line-height: 1.15;
      font-size: 0.88rem;
      color: #4b535a;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .titulo-visualizador {
      flex: 1;
      text-align: right;
      border-right: 8px solid var(--azul-gob);
      padding-right: 24px;
    }

    .titulo-visualizador h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      line-height: 1.08;
      font-weight: 800;
      color: var(--texto);
      letter-spacing: 0.4px;
    }

    .titulo-visualizador span {
      display: block;
      margin-top: 8px;
      color: var(--azul-gob);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
    }

    .franja-color {
      width: 100%;
      height: 7px;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .franja-color .azul { background: var(--azul-gob); }
    .franja-color .rojo { background: var(--rojo-gob); }

    @media (max-width: 820px) {
      .encabezado-institucional {
        flex-direction: column;
        align-items: flex-start;
        padding: 18px 22px;
      }

      .bloque-logo {
        width: 100%;
        min-width: 0;
      }

      .logo-seremi {
        height: 70px;
      }

      .titulo-visualizador {
        width: 100%;
        text-align: left;
        border-right: none;
        border-left: 8px solid var(--azul-gob);
        padding-right: 0;
        padding-left: 18px;
      }
    }
  </style>
</head>
